version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: exotica-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: exotica
      POSTGRES_PASSWORD: exotica
      POSTGRES_DB: brandpulse
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: exotica-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: exotica-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@exotica.mu
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
